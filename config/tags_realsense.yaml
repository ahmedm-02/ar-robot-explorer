# apriltag_ros configuration for the RealSense camera.
# Frame names match the convention used by calibration scripts: tag_<id>.
#
# Add more tag IDs by extending all three lists in lockstep (ids/frames/sizes).

apriltag_realsense:
  ros__parameters:
    family: 36h11
    size: 0.17
    max_hamming: 0
    profile: false
    detector:
      threads: 2
      decimate: 1.0
      blur: 0.0
      refine: 1
      sharpening: 0.25
      debug: 0
    tag:
      ids:    [0,      1,      2,      3,      4,      5]
      frames: [tag_0,  tag_1,  tag_2,  tag_3,  tag_4,  tag_5]
      sizes:  [0.17,   0.17,   0.17,   0.17,   0.17,   0.17]
